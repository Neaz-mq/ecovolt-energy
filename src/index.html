<!doctype html>
<html lang="en">
  <head>
    <!-- ========================= BASIC META ========================== -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="EcoVolt – Next-generation clean energy platform powering a smarter, greener tomorrow." />
    <meta name="theme-color" content="#050f0a" />

    <!-- OG / Social -->
    <meta property="og:title" content="EcoVolt – Clean Energy Solutions" />
    <meta property="og:description" content="Next-generation clean energy platform." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.jpg" />
    <meta name="twitter:card" content="summary_large_image" />

    <title>EcoVolt – Clean Energy Solutions</title>

    <!-- ========================= FAVICONS ========================== -->
    <!-- To change: replace files in /public. See documentation/index.html -->
    <link rel="icon" type="image/svg+xml" href="/favicon-icon.svg" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ========================= FOUC PREVENTION ========================== -->
    <style>
      .navbar,
      .navbar__mobile,
      .navbar__links,
      .navbar__actions,
      .navbar__hamburger {
        opacity: 0;
        visibility: hidden;
      }
    </style>
  </head>

  <body>

    <noscript>
      <style>
        .navbar,
        .navbar__links,
        .navbar__actions,
        .navbar__hamburger {
          opacity: 1 !important;
          visibility: visible !important;
        }
      </style>
    </noscript>

    <!-- ========================= NAVBAR ========================== -->
    <nav class="navbar" id="navbar" aria-label="Main navigation">

      <a href="#home" class="navbar__logo" aria-label="EcoVolt Home">
        <img
          src="/logo.svg"
          alt="EcoVolt Energy"
          class="navbar__logo-img"
          width="140"
          height="40"
          loading="eager"
          decoding="async"
        />
      </a>

      <ul class="navbar__links" role="list">
        <li><a href="#mission">Mission</a></li>
        <li><a href="#solutions">Solutions</a></li>
        <li><a href="#impact">Impact</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>

      <div class="navbar__actions">
        <a href="#contact" class="btn btn--primary btn--sm">Get Started</a>
      </div>

      <button
        class="navbar__hamburger"
        aria-label="Open menu"
        aria-expanded="false"
        aria-controls="mobile-menu"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

    </nav>

    <!-- ========================= MOBILE MENU ========================== -->
    <div
      class="navbar__mobile"
      id="mobile-menu"
      role="navigation"
      aria-label="Mobile navigation"
    >
      <button class="navbar__close" aria-label="Close menu">&times;</button>
      <a href="#mission">Mission</a>
      <a href="#solutions">Solutions</a>
      <a href="#impact">Impact</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
      <a href="#contact" class="btn btn--primary">Get Started</a>
    </div>

    <!-- ========================= MAIN CONTENT ========================== -->
    <main id="home">
      <!-- Sections go here -->
    </main>

    <!-- ========================= SCRIPTS ========================== -->
    <script type="module" src="/js/main.js"></script>

  </body>
</html>
