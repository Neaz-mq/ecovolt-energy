<!doctype html>
<html lang="en">
  <head>
    <!-- ========================= BASIC META ========================== -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="EcoVolt – Next-generation clean energy platform powering a smarter, greener tomorrow." />
    <meta name="author" content="Prographr" />
    <meta name="theme-color" content="#050f0a" />

    <!-- ========================= OG / SOCIAL ========================== -->
    <meta property="og:title"       content="EcoVolt – Clean Energy Solutions" />
    <meta property="og:description" content="Next-generation clean energy platform powering a smarter, greener tomorrow." />
    <meta property="og:type"        content="website" />
    <!-- Replace og-image.jpg with a 1200×630px screenshot of your homepage -->
    <meta property="og:image"       content="/og-image.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="EcoVolt – Clean Energy Solutions" />
    <meta name="twitter:description" content="Next-generation clean energy platform powering a smarter, greener tomorrow." />
    <meta name="twitter:image"       content="/og-image.jpg" />

    <title>EcoVolt – Clean Energy Solutions</title>

    <!-- ========================= FAVICONS ========================== -->
    <!-- To change: replace files in /public — see documentation/index.html -->
    <link rel="icon"             type="image/svg+xml"  href="/favicon-icon.svg" />
    <link rel="icon"             href="/favicon.ico"   sizes="any" />
    <link rel="icon"             type="image/png"      sizes="96x96"   href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180"       href="/apple-touch-icon.png" />
    <link rel="manifest"         href="/site.webmanifest" />

    <!-- ========================= FONT PRELOAD ========================== -->
    <!-- Preload regular & bold weights used above the fold -->
    <link rel="preload" href="/assets/fonts/inter/Inter-Regular.woff2"  as="font" type="font/woff2" crossorigin="anonymous" />
    <link rel="preload" href="/assets/fonts/inter/Inter-SemiBold.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
    <link rel="preload" href="/assets/fonts/inter/Inter-Bold.woff2"     as="font" type="font/woff2" crossorigin="anonymous" />

    <!-- ========================= FOUC PREVENTION ========================== -->
    <style>
      .navbar,
      .navbar__mobile,
      .navbar__links,
      .navbar__actions,
      .navbar__hamburger { opacity: 0; visibility: hidden; }
    </style>
  </head>

  <body>

    <!-- Fallback: show navbar if JS is disabled -->
    <noscript>
      <style>
        .navbar,
        .navbar__links,
        .navbar__actions,
        .navbar__hamburger { opacity: 1 !important; visibility: visible !important; }
      </style>
    </noscript>

    <!-- ========================= NAVBAR ========================== -->
    <nav class="navbar" id="navbar" aria-label="Main navigation">

      <a href="#home" class="navbar__logo" aria-label="EcoVolt – Go to homepage">
        <img
          src="/logo.svg"
          alt="EcoVolt Energy"
          class="navbar__logo-img"
          width="140"
          height="40"
          loading="eager"
          decoding="async"
          fetchpriority="high"
        />
      </a>

      <ul class="navbar__links" role="list">
        <li><a href="#mission">Mission</a></li>
        <li><a href="#solutions">Solutions</a></li>
        <li><a href="#impact">Impact</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>

      <div class="navbar__actions">
        <a href="#contact" class="btn btn--primary btn--sm">Get Started</a>
      </div>

      <button
        class="navbar__hamburger"
        aria-label="Open navigation menu"
        aria-expanded="false"
        aria-controls="mobile-menu"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

    </nav>

    <!-- ========================= MOBILE MENU ========================== -->
    <div
      class="navbar__mobile"
      id="mobile-menu"
      role="navigation"
      aria-label="Mobile navigation"
    >
      <button class="navbar__close" aria-label="Close navigation menu">&times;</button>
      <a href="#mission">Mission</a>
      <a href="#solutions">Solutions</a>
      <a href="#impact">Impact</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
      <a href="#contact" class="btn btn--primary">Get Started</a>
    </div>

    <!-- ========================= MAIN CONTENT ========================== -->
    <main id="home">

      <!-- ===================== SECTIONS GO HERE ===================== -->

    </main>

    <!-- ========================= SCRIPTS ========================== -->
    <script type="module" src="/js/main.js"></script>

  </body>
</html>
